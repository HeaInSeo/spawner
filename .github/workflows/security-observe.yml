name: security-observe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run security lint observation
        run: make lint-security

      - name: Run vuln observation
        run: make vuln

      - name: Upload reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: reports/
          if-no-files-found: warn
